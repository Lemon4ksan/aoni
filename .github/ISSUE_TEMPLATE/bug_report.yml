name: Bug Report
description: Create a report to help us improve aoni
title: "bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
        Please search existing issues before submitting to avoid duplicates.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: I encountered an error when...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: |
        Provide the smallest possible Go snippet that reproduces the issue.
        Wrap code in triple backticks for formatting.
      placeholder: |
        ```go
        client := aoni.NewClient(nil)
        resp, err := client.Request(ctx, http.MethodGet, "/")
        // ...
        ```
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include any error messages or stack traces.
      render: shell
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - Linux
        - macOS
        - Other
    validations:
      required: true
  - type: input
    id: go_version
    attributes:
      label: Go Version
      description: Run `go version` and paste the output.
      placeholder: "e.g., go version go1.24.0 linux/amd64"
    validations:
      required: true
  - type: input
    id: aoni_version
    attributes:
      label: aoni version
      description: Run `go list -m github.com/lemon4ksan/aoni` and paste the output.
      placeholder: "e.g., github.com/lemon4ksan/aoni v0.3.1"
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here (middleware chain, proxy config, etc.).
